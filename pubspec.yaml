name: splitsync_social
description: SplitSync Social - Split expenses, not friendships
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^6.1.0
  flutter_contacts: ^1.1.7+1
  permission_handler: ^11.0.1
  intl: ^0.18.1
  flutter_slidable: ^3.0.0
  animations: ^2.0.8
  shimmer: ^3.0.0
  url_launcher: ^6.2.2    # For UPI deep links
  http: ^1.2.0             # NEW: Backend API calls
  lottie: ^2.7.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
